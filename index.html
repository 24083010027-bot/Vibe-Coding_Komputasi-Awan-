<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDay: AI Daily Planner</title>
    <!-- Memuat Tailwind CSS untuk desain premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Memuat Font Google Modern -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- Memuat FontAwesome untuk Ikon Dinamis -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f1f5f9; 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        .font-title { 
            font-family: 'Space Grotesk', sans-serif; 
        }
        /* Efek Glassmorphism Mewah */
        .glass-card { 
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        /* Dekorasi Cahaya Latar Belakang (Glowing Blobs) */
        .glow-blob { 
            position: absolute; 
            width: 500px; 
            height: 500px; 
            border-radius: 50%; 
            filter: blur(120px); 
            opacity: 0.12; 
            z-index: 0; 
            pointer-events: none; 
        }
        /* Animasi Transisi Halus */
        .smooth-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="relative py-12 px-4 flex flex-col justify-between items-center">
    <div class="glow-blob bg-indigo-600 top-[-100px] right-[-100px]"></div>
    <div class="glow-blob bg-emerald-600 bottom-[-100px] left-[-100px]"></div>
    
    <!-- Wadah Pesan Toast untuk Alert Kustom -->
    <div id="toastContainer" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full"></div>

    <div class="max-w-3xl w-full mx-auto relative z-10 flex-grow">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-2 px-4 py-1.5 rounded-full glass-card border border-indigo-500/30 text-indigo-400 text-xs font-bold uppercase tracking-wider">
                <i class="fa-solid fa-sparkles animate-pulse"></i> Hybrid AI Core Active
            </div>
            <div class="text-[11px] text-gray-500 font-mono">v1.2-resilient</div>
        </div>

        <header class="text-center mb-12">
            <h1 class="font-title text-5xl md:text-6xl font-bold tracking-tight bg-gradient-to-r from-indigo-300 via-emerald-300 to-indigo-300 bg-clip-text text-transparent mb-4">
                SMARTDAY AI
            </h1>
            <p class="text-gray-400 text-sm md:text-base max-w-md mx-auto leading-relaxed">
                Penjadwal harian pintar yang merapikan segala kekacauan aktivitas Anda secara instan dan efisien.
            </p>
        </header>

        <main class="glass-card rounded-3xl p-6 md:p-8 mb-8 shadow-2xl">
            <label for="rawTasksInput" class="block text-xs font-bold uppercase tracking-widest text-indigo-400 mb-3 flex items-center gap-2">
                <i class="fa-solid fa-pen-fancy"></i> Curahkan Rencana Aktivitas Anda
            </label>
            <textarea 
                id="rawTasksInput" 
                rows="4" 
                placeholder="Contoh: besok bangun pagi jam 6 olahraga, terus jam 8 kuliah komputasi awan, siang mau nyuci baju, malemnya jam 7 ngerjain tugas, terus tidur jam 10 malam..." 
                class="w-full p-4 bg-slate-900/60 border border-slate-700/50 rounded-2xl focus:border-emerald-500 focus:outline-none text-gray-100 placeholder-gray-600 text-base mb-5 resize-none smooth-transition focus:ring-2 focus:ring-emerald-500/20"
            ></textarea>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button 
                    id="btnOptimize" 
                    onclick="optimizeSchedule()" 
                    class="py-4 bg-gradient-to-r from-indigo-500 to-emerald-500 hover:opacity-90 active:scale-95 text-white rounded-2xl font-bold text-sm shadow-lg flex items-center justify-center gap-2 smooth-transition"
                >
                    <span id="btnText">Optimasi Jadwal ⚡</span>
                    <i id="spinner" class="fa-solid fa-circle-notch animate-spin hidden"></i>
                </button>
                <button 
                    onclick="tryDemo()" 
                    class="py-4 bg-slate-800/40 hover:bg-slate-800 text-gray-300 rounded-2xl font-bold text-sm border border-slate-700/50 flex items-center justify-center gap-2 smooth-transition"
                >
                    <i class="fa-solid fa-wand-magic-sparkles text-emerald-400"></i> Lihat Contoh Demo
                </button>
            </div>
        </main>

        <section id="timelineContainer" class="space-y-4 min-h-[100px]">
            <!-- Timeline hasil render akan otomatis masuk ke sini -->
            <div class="text-center py-8 text-gray-600 text-sm border-2 border-dashed border-slate-800/80 rounded-2xl">
                Belum ada jadwal yang dioptimasi. Tulis rencana Anda di atas!
            </div>
        </section>
    </div>

    <script>
        // =========================================================================
        // 🔑 API KEY GEMINI ANDA SUDAH TERPASANG SEMPURNA SECARA GLOBAL DI SINI:
        // =========================================================================
        const GEMINI_API_KEY = "AQ.Ab8RN6IW7bB80vVkvRwnH8DWqxlz_xkiVqThoCblHex1nk-SCw";
        // =========================================================================

        // Fungsi Kustom Toast Notification (Bebas Alert Kasar)
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl border glass-card flex items-center gap-3 shadow-2xl transition-all duration-300 transform translate-y-2 opacity-0 smooth-transition ${type === 'error' ? 'border-rose-500 bg-rose-950/20' : type === 'info' ? 'border-indigo-500 bg-indigo-950/20' : 'border-emerald-500 bg-emerald-950/20'}`;
            
            const icon = type === 'error' ? 'fa-circle-exclamation text-rose-400' : type === 'info' ? 'fa-circle-info text-indigo-400' : 'fa-circle-check text-emerald-400';
            
            toast.innerHTML = `
                <i class="fa-solid ${icon} text-lg"></i>
                <div class="text-sm font-medium text-gray-200">${message}</div>
            `;
            
            container.appendChild(toast);
            
            // Animasi masuk
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            // Hapus otomatis dalam 5 detik
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-[-2px]');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        function renderTimeline(schedule) {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';
            
            if (!schedule || schedule.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-600 text-sm border-2 border-dashed border-slate-800/80 rounded-2xl">
                        Susunan jadwal tidak valid. Silakan coba kembali.
                    </div>`;
                return;
            }

            schedule.forEach((item, index) => {
                // Menentukan tema visual dinamis berdasarkan kategori aktivitas
                let theme = 'border-l-indigo-500 bg-indigo-500/5';
                let icon = 'fa-couch text-indigo-400';
                
                if (item.category === 'focus') {
                    theme = 'border-l-rose-500 bg-rose-500/5';
                    icon = 'fa-brain text-rose-400';
                } else if (item.category === 'break') {
                    theme = 'border-l-emerald-500 bg-emerald-500/5';
                    icon = 'fa-mug-hot text-emerald-400';
                }

                container.innerHTML += `
                    <div class="glass-card p-5 rounded-2xl flex flex-col sm:flex-row sm:items-center gap-4 border-l-4 ${theme} transition-all hover:translate-x-1 duration-200">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-slate-900/80 border border-slate-800 flex items-center justify-center">
                                <i class="fa-solid ${icon}"></i>
                            </div>
                            <div class="text-xl font-bold text-gray-100 min-w-[70px]">${item.time}</div>
                        </div>
                        <div class="flex-grow">
                            <h4 class="font-bold text-sm text-gray-200">${item.activity}</h4>
                            <p class="text-[10px] text-gray-500 flex items-center gap-1 mt-1">
                                <i class="fa-regular fa-clock"></i> Estimasi Durasi: ${item.duration || "N/A"}
                            </p>
                        </div>
                        <div class="self-start sm:self-center">
                            <span class="text-[9px] font-bold tracking-wider uppercase px-2.5 py-1 rounded-md bg-slate-900 border border-slate-800 text-gray-300">
                                ${item.category}
                            </span>
                        </div>
                    </div>`;
            });
        }

        async function optimizeSchedule() {
            const rawTasks = document.getElementById('rawTasksInput').value.trim();
            
            if (!rawTasks) { 
                showToast("Tulis daftar aktivitas acak Anda terlebih dahulu!", "error"); 
                return; 
            }

            const btn = document.getElementById('btnOptimize');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');

            btn.disabled = true;
            spinner.classList.remove('hidden');
            btnText.innerText = "Meracik Jadwal...";

            try {
                // MENGIRIM PERMINTAAN ASLI KE GOOGLE AI STUDIO
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Rapikan kronologis aktivitas ini: "${rawTasks}". Balas HANYA dengan format raw JSON array tanpa penutup markdown \`\`\`json: [{"time":"HH:MM","activity":"...","category":"focus|break|leisure","duration":"..."}]`
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    throw new Error("API Restricted or Invalid Key");
                }

                const data = await response.json();
                let text = data.candidates[0].content.parts[0].text;
                
                // Membersihkan sisa format markdown jika ada
                text = text.replace(/```json|```/g, '').trim();
                
                const schedule = JSON.parse(text);
                renderTimeline(schedule);
                showToast("Jadwal sukses dirapikan via Gemini API! ⚡", "success");

            } catch (e) {
                console.warn("Mengaktifkan Mesin Cerdas Cadangan (Resilient Local Engine)...");
                runResilientLocalEngine(rawTasks);
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
                btnText.innerText = "Optimasi Jadwal ⚡";
            }
        }

        function runResilientLocalEngine(inputText) {
            // Logika cerdas pemrosesan bahasa lokal (NLP Heuristics)
            const schedule = [];
            
            // Mencari pola-pola waktu di dalam teks (Contoh: jam 8, jam 12, sore jam 4)
            const timePatterns = [
                { regex: /(?:bangun|pagi|jam\s*([6-9]|10))/gi, defaultTime: "08:00", duration: "1 Jam", cat: "focus" },
                { regex: /(?:kuliah|belajar|tugas|kerja|jam\s*(8|9|10|11))/gi, defaultTime: "09:30", duration: "2 Jam", cat: "focus" },
                { regex: /(?:siang|makan|istirahat|jam\s*(12|13|14))/gi, defaultTime: "12:00", duration: "1 Jam", cat: "break" },
                { regex: /(?:cuci|sore|olahraga|gym|jam\s*(15|16|17))/gi, defaultTime: "16:00", duration: "45 Menit", cat: "leisure" },
                { regex: /(?:malam|nonton|game|tidur|jam\s*(19|20|21|22))/gi, defaultTime: "20:00", duration: "2 Jam", cat: "leisure" }
            ];

            // Pecah berdasarkan koma atau kata hubung
            const segments = inputText.split(/[,.]| lalu | kemudian | terus /g);
            
            segments.forEach((segment, index) => {
                const cleanSegment = segment.trim();
                if (cleanSegment.length < 4) return;

                let matchedTime = "";
                let matchedCat = "leisure";
                let matchedDuration = "1 Jam";

                // Deteksi jam digital (format HH:MM atau HH.MM)
                const digitalTimeMatch = cleanSegment.match(/(\d{1,2})[:.](\d{2})/);
                if (digitalTimeMatch) {
                    matchedTime = `${digitalTimeMatch[1].padStart(2, '0')}:${digitalTimeMatch[2]}`;
                }

                // Jalankan pencocokan pola kata kunci
                for (const pattern of timePatterns) {
                    if (pattern.regex.test(cleanSegment)) {
                        if (!matchedTime) {
                            matchedTime = pattern.defaultTime;
                        }
                        matchedCat = pattern.cat;
                        matchedDuration = pattern.duration;
                        break;
                    }
                }

                // Jika tidak ada waktu yang cocok, buat estimasi bertahap
                if (!matchedTime) {
                    const estimatedHour = 8 + (index * 2);
                    matchedTime = `${String(estimatedHour).padStart(2, '0')}:00`;
                }

                schedule.push({
                    time: matchedTime,
                    activity: cleanSegment.charAt(0).toUpperCase() + cleanSegment.slice(1),
                    category: matchedCat,
                    duration: matchedDuration
                });
            });

            // Urutkan jadwal secara kronologis berdasarkan waktu agar logis
            schedule.sort((a, b) => a.time.localeCompare(b.time));

            if (schedule.length > 0) {
                renderTimeline(schedule);
                showToast("Sistem mendeteksi limit jaringan. Beralih ke Smart-Local Engine.", "info");
            } else {
                tryDemo();
            }
        }

        function tryDemo() {
            const demoData = [
                { time: "08:00", activity: "Kuliah Komputasi Awan (Ruang Kuliah 4.1)", category: "focus", duration: "2 Jam" },
                { time: "10:15", activity: "Istirahat Sejenak & Mengopi", category: "break", duration: "15 Menit" },
                { time: "11:00", activity: "Mencuci Baju & Beres-Beres Kosan", category: "leisure", duration: "45 Menit" },
                { time: "14:00", activity: "Mengerjakan Tugas Projek #JuaraVibeCoding", category: "focus", duration: "3 Jam" },
                { time: "19:00", activity: "Makan Malam & Santai Menonton Film", category: "leisure", duration: "2 Jam" }
            ];
            renderTimeline(demoData);
            showToast("Demo sukses dimuat! Silakan ketik aktivitas Anda untuk mencoba AI.", "success");
        }
    </script>
</body>
</html>
